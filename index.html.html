<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Search Agent</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f2; --bg3: #eeede8;
      --text: #1a1a18; --text2: #6b6b66; --text3: #9a9a94;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --radius: 8px; --radius-lg: 12px;
      --blue-bg: #E6F1FB; --blue-text: #0C447C;
      --green-bg: #EAF3DE; --green-text: #27500A;
      --amber-bg: #FAEEDA; --amber-text: #633806;
      --red-bg: #FCEBEB; --red-text: #791F1F;
      --gray-bg: #F1EFE8; --gray-text: #444441;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c; --bg2: #282825; --bg3: #323230;
        --text: #f0efea; --text2: #a0a09a; --text3: #6a6a64;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
        --blue-bg: #042C53; --blue-text: #B5D4F4;
        --green-bg: #173404; --green-text: #C0DD97;
        --amber-bg: #412402; --amber-text: #FAC775;
        --red-bg: #501313; --red-text: #F7C1C1;
        --gray-bg: #2C2C2A; --gray-text: #D3D1C7;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
    .app-header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; }
    .app-header h1 { font-size: 17px; font-weight: 500; }
    .app-header .subtitle { font-size: 13px; color: var(--text2); }
    .logo { width: 32px; height: 32px; background: var(--text); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: var(--bg); font-size: 16px; }
    .container { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    .tabs { display: flex; gap: 4px; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; }
    .tab { padding: 8px 16px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--text); font-weight: 500; border-bottom-color: var(--text); }
    .panel { display: none; } .panel.active { display: block; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
    .row { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    label { font-size: 12px; color: var(--text2); }
    input, select, textarea {
      font-size: 14px; padding: 8px 10px; border: 0.5px solid var(--border2);
      border-radius: var(--radius); background: var(--bg); color: var(--text);
      outline: none; font-family: inherit; width: 100%;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--text2); box-shadow: 0 0 0 2px rgba(0,0,0,0.06); }
    textarea { resize: vertical; min-height: 80px; }
    .btn { padding: 8px 16px; font-size: 14px; border-radius: var(--radius); cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-family: inherit; transition: opacity 0.15s; }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
    .badge-blue { background: var(--blue-bg); color: var(--blue-text); }
    .badge-green { background: var(--green-bg); color: var(--green-text); }
    .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
    .badge-red { background: var(--red-bg); color: var(--red-text); }
    .badge-gray { background: var(--gray-bg); color: var(--gray-text); }
    .result-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
    .job-title { font-size: 15px; font-weight: 500; }
    .job-meta { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .result-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
    .stat { background: var(--bg2); border-radius: var(--radius); padding: 1rem; }
    .stat-num { font-size: 24px; font-weight: 500; }
    .stat-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .tracker-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; }
    .tracker-row:last-child { border-bottom: none; }
    .status-box { border-radius: var(--radius); padding: 10px 14px; font-size: 13px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .status-info { background: var(--blue-bg); color: var(--blue-text); }
    .status-error { background: var(--red-bg); color: var(--red-text); }
    .status-success { background: var(--green-bg); color: var(--green-text); }
    .spinner { width: 15px; height: 15px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ai-output { background: var(--bg2); border-radius: var(--radius); padding: 14px; font-size: 13px; line-height: 1.7; margin-top: 10px; white-space: pre-wrap; display: none; }
    .empty-state { text-align: center; padding: 2.5rem; color: var(--text2); font-size: 14px; }
    .section-label { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="app-header">
  <div class="logo"><i class="ti ti-briefcase"></i></div>
  <div>
    <div class="app-header h1" style="font-size:17px;font-weight:500;">Job Search Agent</div>
    <div class="subtitle">AI-powered · Tech &amp; Data roles</div>
  </div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('search')"><i class="ti ti-search"></i> Find Jobs</button>
    <button class="tab" onclick="switchTab('tracker')"><i class="ti ti-clipboard-list"></i> Tracker</button>
    <button class="tab" onclick="switchTab('email')"><i class="ti ti-mail"></i> Outreach</button>
  </div>

  <!-- SEARCH -->
  <div id="panel-search" class="panel active">
    <div class="card">
      <div class="row">
        <div class="field">
          <label>Job title / keywords *</label>
          <input type="text" id="search-title" placeholder="e.g. Data Engineer, ML Engineer" />
        </div>
        <div class="field">
          <label>Location</label>
          <input type="text" id="search-loc" value="Remote" placeholder="e.g. San Francisco, Remote" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Experience level</label>
          <select id="search-level">
            <option>Entry level</option>
            <option selected>Mid level</option>
            <option>Senior</option>
            <option>Staff / Principal</option>
          </select>
        </div>
        <div class="field">
          <label>Min salary (USD)</label>
          <input type="text" id="search-salary" placeholder="e.g. 120,000" />
        </div>
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>Your skills (comma-separated)</label>
        <input type="text" id="search-skills" placeholder="e.g. Python, SQL, dbt, Spark, AWS" />
      </div>
      <button class="btn btn-primary" id="search-btn" onclick="searchJobs()">
        <i class="ti ti-sparkles"></i> Find matching jobs
      </button>
    </div>
    <div id="search-status"></div>
    <div id="search-results"></div>
  </div>

  <!-- TRACKER -->
  <div id="panel-tracker" class="panel">
    <div class="stat-grid">
      <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">Total applied</div></div>
      <div class="stat"><div class="stat-num" id="stat-interviews">0</div><div class="stat-lbl">Interviews</div></div>
      <div class="stat"><div class="stat-num" id="stat-offers">0</div><div class="stat-lbl">Offers</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span class="section-label" style="margin:0;">Applications</span>
      <button class="btn" onclick="showAddApp()"><i class="ti ti-plus"></i> Add</button>
    </div>
    <div id="add-app-form" class="card" style="display:none;">
      <div class="row">
        <div class="field"><label>Company</label><input type="text" id="app-company" placeholder="Company name" /></div>
        <div class="field"><label>Role</label><input type="text" id="app-role" placeholder="Job title" /></div>
      </div>
      <div class="row">
        <div class="field">
          <label>Status</label>
          <select id="app-status">
            <option value="applied">Applied</option>
            <option value="interviewing">Interviewing</option>
            <option value="offer">Offer received</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="field"><label>Date applied</label><input type="date" id="app-date" /></div>
      </div>
      <div class="field" style="margin-bottom:12px;"><label>Notes</label><textarea id="app-notes" placeholder="Any notes..."></textarea></div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" onclick="addApplication()">Save</button>
        <button class="btn" onclick="document.getElementById('add-app-form').style.display='none'">Cancel</button>
      </div>
    </div>
    <div id="tracker-list">
      <div class="empty-state"><i class="ti ti-clipboard-list" style="font-size:32px;display:block;margin-bottom:8px;"></i>No applications yet. Start by finding jobs!</div>
    </div>
  </div>

  <!-- EMAIL -->
  <div id="panel-email" class="panel">
    <div class="card">
      <div class="row">
        <div class="field"><label>Your name</label><input type="text" id="email-yourname" placeholder="Your full name" /></div>
        <div class="field"><label>Your background</label><input type="text" id="email-bg" placeholder="e.g. 3 years as Data Analyst" /></div>
      </div>
      <div class="row">
        <div class="field"><label>Recruiter name (optional)</label><input type="text" id="email-toname" placeholder="e.g. Sarah" /></div>
        <div class="field"><label>Target company *</label><input type="text" id="email-company" placeholder="e.g. Stripe" /></div>
      </div>
      <div class="field" style="margin-bottom:12px;">
        <label>Target role *</label>
        <input type="text" id="email-role" placeholder="e.g. Senior Data Engineer" />
      </div>
      <div class="field" style="margin-bottom:14px;">
        <label>Why this company? (optional)</label>
        <textarea id="email-why" placeholder="e.g. I admire their data infrastructure work..."></textarea>
      </div>
      <button class="btn btn-primary" id="email-btn" onclick="draftEmail()">
        <i class="ti ti-sparkles"></i> Draft outreach email
      </button>
    </div>
    <div id="email-status"></div>
    <div class="ai-output" id="email-output"></div>
  </div>
</div>

<script>
const applications = JSON.parse(localStorage.getItem('jsa_apps') || '[]');
renderTracker();

function save() { localStorage.setItem('jsa_apps', JSON.stringify(applications)); }

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['search','tracker','email'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-'+name));
}

function setStatus(elId, type, msg, showSpinner) {
  const el = document.getElementById(elId);
  if (!msg) { el.innerHTML = ''; return; }
  const icon = showSpinner ? '<div class="spinner"></div>'
    : `<i class="ti ti-${type==='error'?'alert-circle':type==='success'?'circle-check':'info-circle'}" style="font-size:16px;flex-shrink:0"></i>`;
  el.innerHTML = `<div class="status-box status-${type}">${icon}<span>${msg}</span></div>`;
}

async function callClaude(prompt, statusElId, btnId) {
  const btn = document.getElementById(btnId);
  btn.disabled = true;
  setStatus(statusElId, 'info', 'Contacting AI — this takes 5–15 seconds...', true);
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
    });
    if (!res.ok) {
      const err = await res.text();
      setStatus(statusElId, 'error', `API error ${res.status}: ${err.slice(0,120)}`);
      btn.disabled = false; return null;
    }
    const data = await res.json();
    if (data.error) { setStatus(statusElId, 'error', data.error.message); btn.disabled = false; return null; }
    setStatus(statusElId, 'success', 'Done!');
    setTimeout(() => setStatus(statusElId, '', ''), 2000);
    btn.disabled = false;
    return data.content?.[0]?.text || null;
  } catch(e) {
    setStatus(statusElId, 'error', `Network error: ${e.message}`);
    btn.disabled = false; return null;
  }
}

async function searchJobs() {
  const title = document.getElementById('search-title').value.trim();
  if (!title) { setStatus('search-status','error','Please enter a job title first.'); return; }
  const loc = document.getElementById('search-loc').value;
  const level = document.getElementById('search-level').value;
  const salary = document.getElementById('search-salary').value;
  const skills = document.getElementById('search-skills').value;
  document.getElementById('search-results').innerHTML = '';
  const prompt = `You are a job search assistant. Generate 4 realistic tech job listings for:
Role: ${title}, Location: ${loc}, Level: ${level}${salary?', Min salary: $'+salary:''}${skills?', Skills: '+skills:''}
Return ONLY a valid JSON array, no markdown. Each object: company, title, location, salary (range), match (70-99), tags (3 strings), summary (2 sentences), posted.`;
  const text = await callClaude(prompt, 'search-status', 'search-btn');
  if (!text) return;
  let jobs;
  try { jobs = JSON.parse(text.replace(/```json|```/g,'').trim()); }
  catch(e) { setStatus('search-status','error',`Couldn't parse response. Try again.`); return; }
  const el = document.getElementById('search-results');
  jobs.forEach(job => {
    const mc = job.match >= 85 ? 'green' : job.match >= 75 ? 'amber' : 'blue';
    el.innerHTML += `<div class="result-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
        <div><div class="job-title">${job.title}</div>
        <div class="job-meta"><i class="ti ti-building"></i> ${job.company} &nbsp;·&nbsp; <i class="ti ti-map-pin"></i> ${job.location} &nbsp;·&nbsp; <i class="ti ti-clock"></i> ${job.posted}</div></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="badge badge-${mc}">${job.match}% match</span>
          <span style="font-size:14px;font-weight:500;color:var(--text2)">${job.salary}</span>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin:8px 0;flex-wrap:wrap;">${job.tags.map(t=>`<span class="badge badge-gray">${t}</span>`).join('')}</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6;">${job.summary}</div>
      <div class="result-actions">
        <button class="btn" style="font-size:13px;" onclick="trackJob('${job.company.replace(/'/g,"\\'")}','${job.title.replace(/'/g,"\\'")}')"><i class="ti ti-plus"></i> Track</button>
        <button class="btn" style="font-size:13px;" onclick="draftForJob('${job.company.replace(/'/g,"\\'")}','${job.title.replace(/'/g,"\\'")}')"><i class="ti ti-mail"></i> Draft email</button>
      </div>
    </div>`;
  });
}

function trackJob(company, role) {
  applications.push({ company, role, status:'applied', date:new Date().toISOString().split('T')[0], notes:'' });
  save(); renderTracker(); switchTab('tracker');
}
function draftForJob(company, role) {
  document.getElementById('email-company').value = company;
  document.getElementById('email-role').value = role;
  switchTab('email');
}
function showAddApp() {
  const f = document.getElementById('add-app-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  document.getElementById('app-date').value = new Date().toISOString().split('T')[0];
}
function addApplication() {
  const company = document.getElementById('app-company').value.trim();
  const role = document.getElementById('app-role').value.trim();
  if (!company || !role) { alert('Fill in company and role.'); return; }
  applications.push({ company, role, status:document.getElementById('app-status').value, date:document.getElementById('app-date').value, notes:document.getElementById('app-notes').value });
  save(); renderTracker();
  document.getElementById('add-app-form').style.display='none';
  ['app-company','app-role','app-notes'].forEach(id => document.getElementById(id).value='');
}
function removeApp(i) { applications.splice(i,1); save(); renderTracker(); }
function renderTracker() {
  document.getElementById('stat-total').textContent = applications.length;
  document.getElementById('stat-interviews').textContent = applications.filter(a=>a.status==='interviewing').length;
  document.getElementById('stat-offers').textContent = applications.filter(a=>a.status==='offer').length;
  const sb = {applied:'blue',interviewing:'amber',offer:'green',rejected:'gray'};
  const sl = {applied:'Applied',interviewing:'Interviewing',offer:'Offer',rejected:'Rejected'};
  const list = document.getElementById('tracker-list');
  if (!applications.length) { list.innerHTML='<div class="empty-state"><i class="ti ti-clipboard-list" style="font-size:32px;display:block;margin-bottom:8px;"></i>No applications yet.</div>'; return; }
  list.innerHTML = '<div class="card">'+applications.map((a,i)=>`
    <div class="tracker-row">
      <div style="flex:1;min-width:120px;"><div style="font-size:14px;font-weight:500;">${a.company}</div><div style="font-size:12px;color:var(--text2);">${a.role}</div></div>
      <span class="badge badge-${sb[a.status]}">${sl[a.status]}</span>
      <span style="font-size:12px;color:var(--text2);">${a.date}</span>
      <button class="btn" style="font-size:12px;padding:4px 10px;" onclick="draftForJob('${a.company.replace(/'/g,"\\'")}','${a.role.replace(/'/g,"\\'")}')"><i class="ti ti-mail"></i></button>
      <button class="btn" style="font-size:12px;padding:4px 10px;" onclick="removeApp(${i})"><i class="ti ti-trash"></i></button>
    </div>`).join('')+'</div>';
}
async function draftEmail() {
  const company = document.getElementById('email-company').value.trim();
  const role = document.getElementById('email-role').value.trim();
  if (!company || !role) { setStatus('email-status','error','Fill in company and role.'); return; }
  const prompt = `Write a concise cold outreach email for a tech job seeker.
From: ${document.getElementById('email-yourname').value||'the candidate'}
Background: ${document.getElementById('email-bg').value||'a tech professional'}
To: ${document.getElementById('email-toname').value||'hiring team'} at ${company}, Role: ${role}
${document.getElementById('email-why').value?'Why: '+document.getElementById('email-why').value:''}
Under 180 words. Start with "Subject: ..." then the email. Warm, specific, ready to send.`;
  document.getElementById('email-output').style.display='none';
  const text = await callClaude(prompt,'email-status','email-btn');
  if (!text) return;
  const out = document.getElementById('email-output');
  out.style.display='block'; out.textContent=text;
}
</script>
</body>
</html>
